<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinculoTEA - Take control of your finances</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <nav>
        <div class="logo">
            <img src="assets/img/logotipo_Horizontal.svg" alt="Logo">
        </div>

        <ul class="nav-links">
            <li><a href="#">Demo <i data-lucide="chevron-down" class="nav-icon"></i></a></li>
            <li><a href="#">Pages <i data-lucide="chevron-down" class="nav-icon"></i></a></li>
            <li><a href="#">Portfolio <i data-lucide="chevron-down" class="nav-icon"></i></a></li>
            <li><a href="#">Blog <i data-lucide="chevron-down" class="nav-icon"></i></a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <div class="nav-actions">
            <a href="#" class="login-link">Log in</a>
            <a href="#" class="btn-demo">Book a demo</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-container">
                <!-- Left: Headline and Rating -->
                <div class="hero-left">
                    <div class="rating">
                        <div class="stars">
                            <i data-lucide="star" fill="#58B164" size="18"></i>
                            <i data-lucide="star" fill="#58B164" size="18"></i>
                            <i data-lucide="star" fill="#58B164" size="18"></i>
                            <i data-lucide="star" fill="#58B164" size="18"></i>
                            <i data-lucide="star" fill="#58B164" size="18"></i>
                        </div>
                        <span class="rating-text">4.8 / 5 rating by users</span>
                    </div>
                    <h1>Take control of <br> your finances</h1>
                </div>

                <!-- Right: Description and Download -->
                <div class="hero-right">
                    <p class="description">
                        Track your daily automatically. Manage your money in a friendly and way, making it easy to
                        guilt-free and save effortlessly.
                    </p>
                    <div class="download-btns">
                        <a href="#"><img
                                src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg"
                                alt="App Store"></a>
                        <a href="#"><img
                                src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
                                alt="Google Play"></a>
                    </div>
                </div>
            </div>

            <!-- The Planet/Orb Visual -->
            <div class="orb-container">
                <div class="orb"></div>
                <div class="orb-glow"></div>
            </div>
        </section>
    </main>

    <script>
        lucide.initIcons();
    </script>
</body>

</html>
